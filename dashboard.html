<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHV Monitor — 後台管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a0f1e;
  color: #e0e0f0;
  min-height: 100vh;
  padding: 32px 20px;
}

/* 登入畫面 */
#loginOverlay {
  position: fixed; inset: 0;
  background: #0a0f1e;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#loginBox {
  background: #111827;
  border: 1px solid #1e2d4a;
  border-radius: 14px;
  padding: 40px 36px;
  width: 100%; max-width: 360px;
  text-align: center;
}
#loginBox h2 { color: #00e5ff; font-size: 1rem; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
#loginBox p { color: #445; font-size: .8rem; margin-bottom: 28px; }
#loginBox input {
  width: 100%; padding: 11px 14px;
  background: #0a0f1e; border: 1px solid #1e2d4a;
  border-radius: 8px; color: #e0e0f0; font-size: .95rem;
  margin-bottom: 14px; outline: none;
}
#loginBox input:focus { border-color: #00e5ff55; }
#loginBtn {
  width: 100%; padding: 11px;
  background: #00e5ff22; border: 1px solid #00e5ff55;
  border-radius: 8px; color: #00e5ff;
  font-size: .95rem; cursor: pointer; transition: background .15s;
}
#loginBtn:hover { background: #00e5ff33; }
#loginErr { color: #e74c3c; font-size: .8rem; margin-top: 10px; min-height: 18px; }
h1 {
  font-size: 1.2rem;
  color: #00e5ff;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.subtitle { font-size: .8rem; color: #556; margin-bottom: 28px; }
.loading { color: #556; font-size: .9rem; text-align: center; padding: 40px; }
.athlete-card {
  background: #111827;
  border: 1px solid #1e2d4a;
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color .2s;
}
.athlete-card:hover { border-color: #00e5ff44; }
.athlete-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  user-select: none;
}
.hd-left {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  flex: 1;
}
.athlete-name { font-size: 1rem; font-weight: 700; color: #e0e0f0; }
.athlete-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.badge { font-size: .72rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
.badge-pre  { background: #1a3a5c; color: #60b0ff; }
.badge-peak { background: #3a1a5c; color: #c060ff; }
.badge-post { background: #1a5c2a; color: #60ff90; }
.badge-unknown { background: #2a2a2a; color: #888; }
.count-label { font-size: .75rem; color: #445; }
.last-date { font-size: .75rem; color: #445; }
.chevron { color: #334; font-size: .9rem; transition: transform .2s; }
.athlete-card.open .chevron { transform: rotate(90deg); }
.athlete-body { display: none; border-top: 1px solid #1e2d4a; overflow-x: auto; }
.athlete-card.open .athlete-body { display: block; }
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
thead tr { background: #0d1525; }
th {
  padding: 10px 16px;
  text-align: left;
  color: #445;
  font-weight: 600;
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
}
td { padding: 10px 16px; border-top: 1px solid #1a2235; color: #bbc; white-space: nowrap; }
.mo-val { font-weight: 700; }
.mo-neg { color: #60b0ff; }
.mo-pos { color: #c060ff; }
.stage-pre  { color: #60b0ff; }
.stage-peak { color: #c060ff; }
.stage-post { color: #60ff90; }
.empty { text-align: center; color: #334; font-size: .85rem; padding: 40px; }
.summary-bar { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
.stat {
  background: #111827;
  border: 1px solid #1e2d4a;
  border-radius: 8px;
  padding: 12px 20px;
  min-width: 120px;
}
.stat-num { font-size: 1.6rem; font-weight: 700; color: #00e5ff; line-height: 1; }
.stat-label { font-size: .72rem; color: #445; margin-top: 4px; }

/* 刪除按鈕 */
.btn-del-person {
  background: transparent;
  border: 1px solid #c0392b44;
  color: #c0392b;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: .72rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}
.btn-del-person:hover { background: #c0392b22; }
.btn-del-row {
  background: transparent;
  border: none;
  color: #c0392b66;
  font-size: .85rem;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  transition: color .15s;
}
.btn-del-row:hover { color: #c0392b; }
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginOverlay">
  <div id="loginBox">
    <h2>PHV Monitor</h2>
    <p>後台管理系統</p>
    <input type="password" id="pwInput" placeholder="請輸入密碼" autocomplete="current-password" />
    <button id="loginBtn" onclick="doLogin()">登入</button>
    <div id="loginErr"></div>
  </div>
</div>

<h1>PHV Monitor — 後台管理</h1>
<p class="subtitle">所有運動員資料總覽</p>

<div class="summary-bar" id="summaryBar"></div>
<div id="list"><div class="loading">載入中…</div></div>

<script>
// ── 登入邏輯（純前端 SHA-256）──────────────────────────
const SESSION_KEY = 'phv_admin_auth';
// 修改密碼：在終端機執行 node -e "const c=require('crypto');console.log(c.createHash('sha256').update('你的密碼').digest('hex'))"
// 將輸出的 hash 貼到下面
const ADMIN_HASH = '4a2bf17c03d25883c51dd19cda9fa78d5c14dc85f95fcf493204405c327dceeb'; // 預設密碼：phvadmin

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  if (!pw) { err.textContent = '請輸入密碼'; return; }

  const hash = await sha256(pw);
  if (hash === ADMIN_HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('loginOverlay').style.display = 'none';
    load();
  } else {
    await new Promise(r => setTimeout(r, 500)); // 防止暴力嘗試
    err.textContent = '密碼錯誤，請再試一次';
    document.getElementById('pwInput').value = '';
  }
}

async function checkSession() {
  return sessionStorage.getItem(SESSION_KEY) === '1';
}

// Enter 鍵也可登入
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  checkSession().then(ok => {
    if (ok) {
      document.getElementById('loginOverlay').style.display = 'none';
      load();
    }
    // 若未登入，loginOverlay 預設顯示，不呼叫 load()
  });
});

// ── 後台資料邏輯 ──────────────────────────────────────
const STAGE_LABEL = { pre: '發育前期', peak: '接近 PHV', post: '發育後期' };
const STAGE_CLS   = { pre: 'pre', peak: 'peak', post: 'post' };

async function load() {
  const res = await fetch('/api/records');
  const athletes = await res.json();

  const bar = document.getElementById('summaryBar');
  const totalRecords = athletes.reduce((s, a) => s + a.count, 0);
  bar.innerHTML = `
    <div class="stat"><div class="stat-num">${athletes.length}</div><div class="stat-label">運動員人數</div></div>
    <div class="stat"><div class="stat-num">${totalRecords}</div><div class="stat-label">總測量次數</div></div>
  `;

  const list = document.getElementById('list');
  if (!athletes.length) { list.innerHTML = '<div class="empty">尚無資料</div>'; return; }

  list.innerHTML = athletes.map(a => {
    const cls = STAGE_CLS[a.last_stage] || 'unknown';
    const label = STAGE_LABEL[a.last_stage] || a.last_stage || '—';
    return `
      <div class="athlete-card" id="card-${encodeURIComponent(a.name)}">
        <div class="athlete-hd">
          <div class="hd-left" onclick="toggle('${escAttr(a.name)}')">
            <span class="chevron">▶</span>
            <span class="athlete-name">${esc(a.name)}</span>
            <div class="athlete-meta">
              <span class="last-date">最近：${a.last_date || '—'}</span>
              <span class="count-label">${a.count} 筆</span>
              <span class="badge badge-${cls}">${label}</span>
            </div>
          </div>
          <button class="btn-del-person" onclick="deletePerson('${escAttr(a.name)}')">刪除此人</button>
        </div>
        <div class="athlete-body" id="body-${encodeURIComponent(a.name)}">
          <div class="loading">載入中…</div>
        </div>
      </div>`;
  }).join('');
}

async function toggle(name) {
  const card = document.getElementById('card-' + encodeURIComponent(name));
  const body = document.getElementById('body-' + encodeURIComponent(name));
  const isOpen = card.classList.contains('open');
  if (isOpen) { card.classList.remove('open'); return; }
  card.classList.add('open');
  await loadRecords(name, body);
}

async function loadRecords(name, body) {
  body.dataset.loaded = '1';
  const res = await fetch('/api/records?name=' + encodeURIComponent(name));
  const records = await res.json();
  if (!records.length) { body.innerHTML = '<div class="empty">無歷史紀錄</div>'; return; }
  body.innerHTML = `
    <table>
      <thead><tr><th>日期</th><th>MO 偏移</th><th>身高 (cm)</th><th>發育階段</th><th></th></tr></thead>
      <tbody>
        ${records.map(r => {
          const mo = Number(r.mo).toFixed(1);
          const moCls = r.mo < 0 ? 'mo-neg' : 'mo-pos';
          const moStr = r.mo >= 0 ? '+' + mo : mo;
          const stCls = 'stage-' + (STAGE_CLS[r.stage] || 'pre');
          const stLabel = STAGE_LABEL[r.stage] || r.stage;
          return `<tr id="row-${r.id}">
            <td>${r.date}</td>
            <td><span class="mo-val ${moCls}">${moStr}</span></td>
            <td>${Number(r.height).toFixed(1)}</td>
            <td class="${stCls}">${stLabel}</td>
            <td><button class="btn-del-row" onclick="deleteRow(${r.id},'${escAttr(name)}')" title="刪除此筆">🗑</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function deleteRow(id, name) {
  if (!confirm('確定要刪除這筆紀錄？')) return;
  await fetch('/api/records?id=' + id, { method: 'DELETE' });
  // 重新載入該人的紀錄
  const body = document.getElementById('body-' + encodeURIComponent(name));
  body.dataset.loaded = '';
  body.innerHTML = '<div class="loading">載入中…</div>';
  await loadRecords(name, body);
  // 更新統計列
  load();
}

async function deletePerson(name) {
  if (!confirm(`確定要刪除「${name}」的所有紀錄？此動作無法復原。`)) return;
  await fetch('/api/records?name=' + encodeURIComponent(name), { method: 'DELETE' });
  load();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"\\'");
}
</script>
</body>
</html>
